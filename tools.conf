# tools.conf — registered AI coding tools
#
# One entry per tool. The setup script reads this to create symlinks
# for instruction files and skills automatically.
#
# Format:  config_dir   instructions_filename
#
# To add a new tool (e.g. Gemini):
#   1. Add a line below
#   2. Re-run: bash ~/.agents/setup.sh
#
~/.claude    CLAUDE.md
~/.codex     AGENTS.md
~/.copilot   copilot-instructions.md
